<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원가입 - Web Study</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="card">
        <h1>회원가입</h1>
        <p class="subtitle">계정을 만들어보세요</p>

        <div class="form-group">
            <label for="username">아이디</label>
            <input type="text" id="username" placeholder="3~20자" autocomplete="username" />
        </div>
        <div class="form-group">
            <label for="password">비밀번호</label>
            <input type="password" id="password" placeholder="6자 이상" autocomplete="new-password" />
        </div>

        <button class="btn btn-primary" id="registerBtn">가입하기</button>

        <div class="msg" id="msg"></div>

        <div class="link-row">
            이미 계정이 있나요? <a href="login.html">로그인</a>
        </div>
    </div>

    <script>
        document.getElementById('registerBtn').addEventListener('click', async () => {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const msg = document.getElementById('msg');

            msg.style.display = 'none';

            // fetch로 서버 API 호출
            // - method: POST (데이터 전송)
            // - headers: JSON 형식으로 보낸다고 알림
            // - body: JS 객체를 JSON 문자열로 변환
            const res = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await res.json();

            msg.style.display = 'block';

            if (res.ok) {
                msg.className = 'msg success';
                msg.textContent = data.message + ' 잠시 후 로그인 페이지로 이동합니다.';
                setTimeout(() => { window.location.href = 'login.html'; }, 1500);
            } else {
                msg.className = 'msg error';
                msg.textContent = data.error;
            }
        });

        // Enter 키로 제출
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('registerBtn').click();
        });
    </script>
</body>

</html>
