<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인 - Web Study</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="card">
        <h1>로그인</h1>
        <p class="subtitle">계정에 로그인하세요</p>

        <div class="form-group">
            <label for="username">아이디</label>
            <input type="text" id="username" placeholder="아이디 입력" autocomplete="username" />
        </div>
        <div class="form-group">
            <label for="password">비밀번호</label>
            <input type="password" id="password" placeholder="비밀번호 입력" autocomplete="current-password" />
        </div>

        <button class="btn btn-primary" id="loginBtn">로그인</button>

        <div class="msg" id="msg"></div>

        <div class="link-row">
            계정이 없나요? <a href="register.html">회원가입</a>
        </div>
    </div>

    <script>
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const msg = document.getElementById('msg');

            msg.style.display = 'none';

            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await res.json();

            if (res.ok) {
                // 로그인 성공 → 프로필 페이지로 이동
                // 서버가 Set-Cookie 헤더로 세션 쿠키를 내려보내고,
                // 이후 요청마다 브라우저가 자동으로 쿠키를 첨부함
                window.location.href = 'profile.html';
            } else {
                msg.style.display = 'block';
                msg.className = 'msg error';
                msg.textContent = data.error;
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('loginBtn').click();
        });
    </script>
</body>

</html>
